name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-extras --python 3.12
      - name: Lint
        run: uv run poe lint
      - name: mypy (strict)
        run: uv run poe typecheck

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --all-extras --python ${{ matrix.python-version }}
      - name: Run tests with coverage
        run: uv run pytest --ignore=tests/e2e --cov=adflux --cov-report=xml --cov-report=term --junitxml=junit.xml
      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: junit.xml
          check_name: Tests (${{ matrix.os }} / py${{ matrix.python-version }})
          include_passed: true
          detailed_summary: true
          require_tests: true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            junit.xml
            coverage.xml
          if-no-files-found: ignore
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv build
      - name: Verify wheel installs and CLI runs
        run: |
          python -m venv /tmp/smoketest
          /tmp/smoketest/bin/pip install dist/*.whl
          /tmp/smoketest/bin/adflux list-formats
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
